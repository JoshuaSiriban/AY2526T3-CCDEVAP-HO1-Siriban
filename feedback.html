       <h2>Send your feedback</h2>

    <form>

        <label>Name:</label>
        <input type="text" title="name">
        <br><br>

        <label>Title:</label>
        <input type="text" title="Title">

        <input type="radio" title="Male"> Male
        <input type="radio" title="Female"> Female

        <br><br>

        <label>Improvements to my webpage?</label><br>

        <textarea rows="5" cols="40" title="Improvements"></textarea>
        <br><br>

        <input type="reset" value="Reset">

    </form>
